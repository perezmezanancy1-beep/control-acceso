<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Administrativo</title>

<link rel="stylesheet"
 href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.minnd:#0b1220;
  font-family: Arial, sans-serif;
  color:white;
}
.card{
  max-width:420px;
  margin:40px auto;
  background:#0f172a;
  border-radius:20px;
  padding:24px;
}
.logo{
  width:90px;
  display:block;
  margin:0 auto 10px;
}
label{
  font-weight:bold;
}
.form-control{
  background:#020617;
  border:none;
  color:white;
}
</style>
</head>

<body>

<div class="card">

<img src="/static/logo.png"="text-center text-info">Registro Administrativo</h4>
<p class="text-center">Universidad Autónoma del Caribe</p>

<div id="msg" class="alert alert-success d-none">
✅ Registro exitoso
</div>

<form id="formPersona">

<label>Cédula</label>
<input id="cedula" class="form-control mb-2" required>

<label>Nombres</label>
<input id="nombres" class="form-control mb-2" required>

<label>Apellidos</label>
<input id="apellidos" class="form-control mb-2" required>

<label>Carrera</label>
<input id="carrera" class="form-control mb-2" required>

<label>Facultad</label>
<input id="facultad" class="form-control mb-3" required>

<button type="submit" class="btn btn-primary w-100">
Registrar
</button>

</form>

<button id="volver" class="btn btn-secondary w-100 mt-3 d-none"
 onclick="windowtById("formPersona");
const msg = document.getElementById("msg");
const volver = document.getElementById("volver");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    cedula: cedula.value,
    nombres: nombres.value,
    apellidos: apellidos.value,
    carrera: carrera.value,
    facultad: facultad.value,
    grupo: facultad.value,
    huella_id: 0,
    dentro: false,
    activo: true
  };

  try{
    const res = await fetch("/personas",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if(!res.ok){
      alert("Error al registrar");
      return;
    }

    msg.classList.remove("d-none");
    form.reset();
    volver.classList.remove("d-none");

    setTimeout(()=>{
      window.location.href =
        `/static/qr_dinamico.html?qr=${result.qr_id}&nombre=${result.cedula}`;
    },1200);

  }catch(err){
    alert("Error de conexión");
  }
});
</script>

</body>
</html>
