<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Administrativo</title>

<!-- ✅ Bootstrap BIEN cargado -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<style>
body{
  background: radial-gradient(1200px 600px at 50% -10%, #1f2a44 0%, #0b1220 60%);
  font-family: Arial, sans-serif;
  color: #f8fafc;
}

.card{
  max-width: 420px;
  margin: 40px auto;
  background: #0f172a;
  border-radius: 24px;
  padding: 28px 24px;
  box-shadow: 0 30px 60px rgba(0,0,0,.45);
}

/* LOGO */
.logo{
  width: 90px;
  display: block;
  margin: 0 auto 12px;
}

/* TÍTULOS */
.titulo{
  text-align: center;
  font-weight: 900;
  font-size: 22px;
  color: #38bdf8;
}

.subtitulo{
  text-align: center;
  font-size: 14px;
  color: #e5e7eb;
  margin-bottom: 18px;
}

/* LABELS (MÁS CLAROS ✅) */
label{
  color: #f9fafb;
  font-weight: 700;
  margin-bottom: 4px;
}

/* INPUTS */
.form-control{
  background: #020617;
  border: none;
  color: white;
  border-radius: 10px;
}

.form-control::placeholder{
  color: #94a3b8;
}

/* BOTÓN */
.btn-custom{
  background: #2563eb;
  border: none;
  border-radius: 14px;
  padding: 10px;
  font-weight: bold;
  color: white;
}

.btn-custom:hover{
  background: #1d4ed8;
}

/* MENSAJE ÉXITO */
.alert-success{
  background: #16a34a;
  border: none;
  color: white;
  border-radius: 14px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<div class="card">

  <!-- LOGO -->
  <img src="/static/logo.png" class="logo" alt="Logo UAC">

  <div class="titulo">Registro Administrativo</div>
  <div class="subtitulo">Universidad Autónoma del Caribe</div>

  <!-- MENSAJE -->
  <div id="successMsg" class="alert alert-success d-none">
    ✅ Registro exitoso
  </div>

  <!-- FORMULARIO -->
  <form id="formPersona">

    <div class="mb-2">
      <label for="cedula">Cédula</label>
      <input id="cedula" class="form-control" required>
    </div>

    <div class="mb-2">
      <label for="nombres">Nombres</label>
      <input id="nombres" class="form-control" required>
    </div>

    <div class="mb-2">
      <label for="apellidos">Apellidos</label>
      <input id="apellidos" class="form-control" required>
    </div>

    <div class="mb-2">
      <label for="carrera">Carrera</label>
      <input id="carrera" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="facultad">Facultad</label>
      <input id="facultad" class="form-control" required>
    </div>

    <!-- ✅ IMPORTANTE: type="submit" -->
    <button type="submit" class="btn btn-custom w-100">
      Registrar
    </button>

  </form>

</div>

<script>
document.getElementById("formPersona").addEventListener("submit", async function (e) {
  e.preventDefault(); // ✅ evita recarga

  const data = {
    cedula: document.getElementById("cedula").value,
    nombres: document.getElementById("nombres").value,
    apellidos: document.getElementById("apellidos").value,
    carrera: document.getElementById("carrera").value,
    facultad: document.getElementById("facultad").value,
    grupo: document.getElementById("facultad").value,
    huella_id: 0,
    dentro: false,
    activo: true
  };

  try {
    const res = await fetch("/personas", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (!res.ok) {
      alert("Error al registrar");
      console.error(result);
      return;
    }

    // ✅ Mostrar éxito
    document.getElementById("successMsg").classList.remove("d-none");
    document.getElementById("formPersona").reset();

    // ✅ Redirigir al QR
    setTimeout(() => {
      window.location.href =
        `/static/qr_dinamico.html?qr=${result.qr_id}&nombre=${result.cedula}`;
    }, 1200);

  } catch (err) {
    alert("Error de conexión con el backend");
    console.error(err);
  }
});
</script>

</body>
</html>
