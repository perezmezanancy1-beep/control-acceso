<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Administrativo</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<style>
body {
  background:#0b1220;
  color:white;
}
.card {
  max-width:420px;
  margin:auto;
  margin-top:40px;
  background:#0f172a;
  border-radius:20px;
  padding:25px;
}
</style>
</head>

<body>

<div class="card">
  <h4 class="text-center mb-3">Registro Administrativo</h4>

  <form id="formPersona">
    <div class="mb-2">
      <label>Cédula</label>
      <input class="form-control" id="cedula" required>
    </div>

    <div class="mb-2">
      <label>Nombres</label>
      <input class="form-control" id="nombres" required>
    </div>

    <div class="mb-2">
      <label>Apellidos</label>
      <input class="form-control" id="apellidos" required>
    </div>

    <div class="mb-2">
      <label>Carrera</label>
      <input class="form-control" id="carrera" required>
    </div>

    <div class="mb-3">
      <label>Facultad</label>
      <input class="form-control" id="facultad" required>
    </div>

    <button class="btn btn-primary w-100">Registrar</button>
  </form>
</div>

<script>
document.getElementById("formPersona").addEventListener("submit", async function(e){
  e.preventDefault();

  const data = {
    cedula: document.getElementById("cedula").value,
    nombres: document.getElementById("nombres").value,
    apellidos: document.getElementById("apellidos").value,
    carrera: document.getElementById("carrera").value,
    facultad: document.getElementById("facultad").value,
    grupo: document.getElementById("facultad").value,
    huella_id: 0,
    dentro: false,
    activo: true
  };

  try {
    const response = await fetch("/personas", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if (!response.ok) {
      alert("Error al registrar");
      console.error(result);
      return;
    }

    // ✅ REDIRIGE A LA MISMA PÁGINA DEL QR
    window.location.href =
      `/static/qr_dinamico.html?qr=${result.qr_id}&nombre=${result.cedula}&v=${Date.now()}`;

  } catch (error) {
    alert("Error de conexión con el backend");
    console.error(error);
  }
});
</script>

</body>
</html>
