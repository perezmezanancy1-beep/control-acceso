<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Personas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">
    <h2 class="mb-4">Registro Administrativo</h2>

    <form id="formPersona">

        <div class="mb-3">
            <label>Cédula</label>
            <input class="form-control" id="cedula" required>
        </div>

        <div class="mb-3">
            <label>Nombres</label>
            <input class="form-control" id="nombres" required>
        </div>

        <div class="mb-3">
            <label>Apellidos</label>
            <input class="form-control" id="apellidos" required>
        </div>

        <div class="mb-3">
            <label>Carrera</label>
            <input class="form-control" id="carrera" required>
        </div>

        <div class="mb-3">
            <label>Facultad</label>
            <input class="form-control" id="facultad" required>
        </div>

        <button class="btn btn-primary w-100">Registrar</button>
    </form>

    <div id="qrContainer" class="text-center mt-4 d-none">
        <h5>QR generado</h5>

        <img id="qrImage" class="img-fluid mb-3">

        <div class="d-grid gap-2">
            <a id="qrOpen" class="btn btn-primary" target="_blank">
                Ver QR dinámico
            </a>

            <a id="qrDownload" class="btn btn-success" download>
                Descargar QR
            </a>
        </div>
    </div>

    <pre id="resultado"></pre>
</div>

<script>
document.getElementById("formPersona").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        cedula: document.getElementById("cedula").value,
        nombres: document.getElementById("nombres").value,
        apellidos: document.getElementById("apellidos").value,
        carrera: document.getElementById("carrera").value,
        facultad: document.getElementById("facultad").value,

        // 🔴 ESTE CAMPO ES OBLIGATORIO PARA EL BACKEND
        grupo: document.getElementById("facultad").value,

        huella_id: 0,
        dentro: false,
        activo: true
    };

    try {
        const response = await fetch("http://127.0.0.1:8000/personas", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        // ✅ Si hay error
        if (!response.ok) {
            alert("Error al registrar:\n" + JSON.stringify(result));
            return;
        }

        const qrBase = result.qr_id;

        // ✅ URL dinámica
        const qrDinamicoUrl = `qr_dinamico.html?qr=${qrBase}`;

        // ✅ Mostrar QR base
        document.getElementById("qrImage").src =
            `http://127.0.0.1:8000/qrs/${qrBase}.png`;

        // ✅ Enlace dinámico
        document.getElementById("qrOpen").href = qrDinamicoUrl;

        // ✅ Descargar QR
        document.getElementById("qrDownload").href =
            `http://127.0.0.1:8000/qrs/${qrBase}.png`;

        // ✅ Mostrar contenedor
        document.getElementById("qrContainer").classList.remove("d-none");

        // ✅ ABRIR AUTOMÁTICO 🔥
        window.open(qrDinamicoUrl, "_blank");

        // ✅ Mostrar respuesta
        document.getElementById("resultado").textContent =
            JSON.stringify(result, null, 2);

    } catch (error) {
        alert("Error de conexión con el backend");
        console.error(error);
    }
});
</script>

</body>
</html>
