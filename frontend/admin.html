<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Administrativo</title>

<!-- ✅ BOOTSTRAP BIEN CARGADO -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<style>
body{
  background: radial-gradient(1200px 600px at 50% -10%, #1f2a44 0%, #0b1220 60%);
  font-family: Arial, sans-serif;
  color:#e5e7eb;
}

.card{
  max-width:420px;
  margin:40px auto;
  background:#0f172a;
  border-radius:24px;
  padding:28px 24px;
  box-shadow:0 30px 60px rgba(0,0,0,.45);
}

.logo{
  width:90px;
  display:block;
  margin:0 auto 10px;
}

h4{
  color:#38bdf8;
  font-weight:900;
}

label{
  color:white;
  font-weight:600;
}

.form-control{
  background:#020617;
  border:none;
  color:white;
}

.btn-custom{
  background:#2563eb;
  border:none;
  border-radius:14px;
  font-weight:bold;
}

.alert-success{
  background:#16a34a;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="card">

  <img src="/static/logo.png" class="logo" alt="Logo UAC">

  <h4 class="text-center">Registro Administrativo</h4>
  <p class="text-center">Universidad Autónoma del Caribe</p>

  <div id="successMsg" class="alert alert-success d-none">
    ✅ Registro exitoso
  </div>

  <form id="formPersona">

    <label>Cédula</label>
    <input class="form-control mb-2" id="cedula" required>

    <label>Nombres</label>
    <input class="form-control mb-2" id="nombres" required>

    <label>Apellidos</label>
    <input class="form-control mb-2" id="apellidos" required>

    <label>Carrera</label>
    <input class="form-control mb-2" id="carrera" required>

    <label>Facultad</label>
    <input class="form-control mb-3" id="facultad" required>

    <button type="submit" class="btn btn-custom w-100">
      Registrar
    </button>

  </form>

  <button id="volverBtn"
          class="btn btn-secondary w-100 mt-3 d-none"
          onclick="window.location.href='/'lementById("volverBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    cedula: cedula.value,
    nombres: nombres.value,
    apellidos: apellidos.value,
    carrera: carrera.value,
    facultad: facultad.value,
    grupo: facultad.value,
    huella_id: 0,
    dentro: false,
    activo: true
  };

  try{
    const res = await fetch("/personas", {
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if(!res.ok){
      alert("Error al registrar");
      return;
    }

    successMsg.classList.remove("d-none");
    form.reset();
    volverBtn.classList.remove("d-none");

    setTimeout(()=>{
      window.location.href =
        `/static/qr_dinamico.html?qr=${result.qr_id}&nombre=${result.cedula}`;
    },1200);

  }catch(err){
    alert("Error de conexión");
  }
});
</script>

</body>
</html>
