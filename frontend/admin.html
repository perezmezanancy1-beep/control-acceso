<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Administrativo</title>

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.minadial-gradient(1200px 600px at 50% -10%, #1f2a44 0%, #0b1220 60%);
  font-family: Arial, sans-serif;
  color: #e5e7eb;
}

.card{
  max-width: 420px;
  margin: 40px auto;
  background: #0f172a;
  border-radius: 24px;
  padding: 28px 24px;
  box-shadow: 0 30px 60px rgba(0,0,0,.45);
}

.logo{
  width: 90px;
  display: block;
  margin: 0 auto 10px;
}

.titulo{
  text-align: center;
  font-weight: 900;
  font-size: 22px;
  color: #38bdf8;
}

.subtitulo{
  text-align: center;
  font-size: 14px;
  color: #cbd5f5;
  margin-bottom: 18px;
}

label{
  font-weight: 600;
  color: #f8fafc;
}

.form-control{
  background: #020617;
  border: none;
  color: white;
  border-radius: 10px;
}

.btn-custom{
  background: #2563eb;
  border: none;
  border-radius: 14px;
  padding: 10px;
  font-weight: bold;
}

.alert-success{
  background: #16a34a;
  border: none;
  color: white;
  border-radius: 14px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<div class="card">

  <img src="/static/logo.png" class="logo" alt="Logodministrativo</div>
  <div class="subtitulo">Universidad Autónoma del Caribe</div>

  <div id="successMsg" class="alert alert-success d-none">
    ✅ Registro exitoso
  </div>

  <form id="formPersona">

    <div class="mb-2">
      <label>Cédula</label>
      <input class="form-control" id="cedula" required>
    </div>

    <div class="mb-2">
      <label>Nombres</label>
      <input class="form-control" id="nombres" required>
    </div>

    <div class="mb-2">
      <label>Apellidos</label>
      <input class="form-control" id="apellidos" required>
    </div>

    <div class="mb-2">
      <label>Carrera</label>
      <input class="form-control" id="carrera" required>
    </div>

    <div class="mb-3">
      <label>Facultad</label>
      <input class="form-control" id="facultad" required>
    </div>

    <button type="submit" class="btn btn-custom w-100">
      Registrar
    </button>

  </form>

  <button id="volverBtn"
          class="btn btn-secondary w-100 mt-3 d-none"
          onclick="window.location"submit", async function(e){
  e.preventDefault();

  const data = {
    cedula: document.getElementById("cedula").value,
    nombres: document.getElementById("nombres").value,
    apellidos: document.getElementById("apellidos").value,
    carrera: document.getElementById("carrera").value,
    facultad: document.getElementById("facultad").value,
    grupo: document.getElementById("facultad").value,
    huella_id: 0,
    dentro: false,
    activo: true
  };

  try{
    const response = await fetch("/personas",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if(!response.ok){
      alert("Error al registrar");
      return;
    }

    document.getElementById("successMsg").classList.remove("d-none");
    document.getElementById("formPersona").reset();
    document.getElementById("volverBtn").classList.remove("d-none");

    setTimeout(()=>{
      window.location.href =
        `/static/qr_dinamico.html?qr=${result.qr_id}&nombre=${result.cedula}&v=${Date.now()}`;
    },1500);

  }catch(error){
    alert("Error de conexión con el backend");
    console.error(error);
  }
});
</script>

</body>
</html>
