<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Administrativo</title>

<link rel="stylesheet"
 href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<style>
body{
  background: radial-gradient(1200px 600px at 50% -10%, #1f2a44 0%, #0b1220 60%);
  font-family: Arial, sans-serif;
  color:#e5e7eb;
}

.card{
  max-width:420px;
  margin:40px auto;
  background:#0f172a;
  border-radius:24px;
  padding:24px;
}

.logo{
  width:90px;
  display:block;
  margin:0 auto 10px;
}

label{
  font-weight:600;
}

.form-control{
  background:#020617;
  border:none;
  color:white;
}

.btn-custom{
  background:#2563eb;
  border:none;
  border-radius:14px;
  font-weight:bold;
}

.alert-success{
  background:#16a34a;
  border:none;
  color:white;
}
</style>
</head>

<body>

<div class="card">

<img src="/static/logo.png" class="logo">

<h4 class="text-center text-info">Registro Administrativo</h4>
<p class="text-center">Universidad Autónoma del Caribe</p>

<div id="msg" class="alert alert-success d-none">
✅ Registro exitoso
</div>

<form id="formPersona">

<label>Cédula</label>
<input id="cedula" class="form-control mb-2" required>

<label>Nombres</label>
<input id="nombres" class="form-control mb-2" required>

<label>Apellidos</label>
<input id="apellidos" class="form-control mb-2" required>

<label>Carrera</label>
<input id="carrera" class="form-control mb-2" required>

<label>Facultad</label>
<input id="facultad" class="form-control mb-3" required>

<button type="submit" class="btn btn-custom w-100">
Registrar
</button>

</form>

<button id="volver"
 class="btn btn-secondary w-100 mt-3 d-none"
 onclick="window"msg");
const volver = document.getElementById("volver");

form.addEventListener("submit", async function(e){
  e.preventDefault();

  const data = {
    cedula: document.getElementById("cedula").value,
    nombres: document.getElementById("nombres").value,
    apellidos: document.getElementById("apellidos").value,
    carrera: document.getElementById("carrera").value,
    facultad: document.getElementById("facultad").value,
    grupo: document.getElementById("facultad").value,
    huella_id: 0,
    dentro: false,
    activo: true
  };

  try {
    const res = await fetch("/personas", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (!res.ok) {
      alert("Error al registrar");
      console.error(result);
      return;
    }

    msg.classList.remove("d-none");
    form.reset();
    volver.classList.remove("d-none");

    setTimeout(() => {
      window.location.href =
        `/static/qr_dinamico.html?qr=${result.qr_id}&nombre=${result.cedula}`;
    }, 1200);

  } catch (err) {
    alert("Error de conexión con el backend");
    console.error(err);
  }
});
</script>

</body>
</html>
