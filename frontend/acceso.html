<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Acceso</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    font-family: Arial, sans-serif;
}

.card {
    background: #1e293b;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.titulo {
    color: #38bdf8;
    font-weight: bold;
    font-size: 24px;
}

.subtitulo {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 20px;
}

.input-group-text {
    background: #0f172a;
    color: white;
    border: none;
}

.form-control {
    border: none;
    text-align: center;
}

.btn-custom {
    background: #2563eb;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    color: white;
}

.btn-custom:hover {
    background: #1d4ed8;
}
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card text-center" style="width: 320px;">
        
        <h3 class="titulo">Control de Acceso</h3>
        <p class="subtitulo">Universidad Autónoma del Caribe</p>

        <div class="input-group mb-3">
            <span class="input-group-text">ID</span>
            <input id="cedula" class="form-control" placeholder="Ingresa tu cédula">
        </div>

        <button class="btn btn-custom w-100" onclick="buscarUsuario()">
            Ingresar
        </button>
    </div>
</div>

<script>
async function buscarUsuario() {

    const cedula = document.getElementById("cedula").value.trim();

    if (!cedula) {
        alert("Ingresa tu cédula");
        return;
    }

    try {
        const res = await fetch(`/buscar_usuario?nombre=${cedula}`);
        const data = await res.json();

        if (!data.encontrado) {
            alert("Usuario no encontrado");
            return;
        }

        // ✅ CACHE BUSTING (ESTE ERA EL DETALLE FINAL)
        window.location.href =
            `/static/qr_dinamico.html?qr=${data.qr_id}&nombre=${cedula}&v=${Date.now()}`;

    } catch (error) {
        console.error(error);
        alert("Error conectando con el servidor");
    }
}
</script>

</body>
</html>
