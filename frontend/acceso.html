<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Acceso</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <style>
    body {
      background: radial-gradient(1200px 600px at 50% -10%, #1f2a44 0%, #0b1220 60%);
      color: white;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 340px;
      background: #0f172a;
      border-radius: 24px;
      padding: 28px 22px;
      box-shadow: 0 30px 60px rgba(0,0,0,.45);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* LOGO */
    .logo {
      width: 110px;
      margin-bottom: 6px;
    }

    .titulo {
      color: #38bdf8;
      font-weight: 900;
      font-size: 22px;
      margin-top: 4px;
    }

    .subtitulo {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 10px;
      text-align: center;
    }

    .input-group-text {
      background: #020617;
      color: white;
      border: none;
    }

    .form-control {
      border: none;
      text-align: center;
      background: #020617;
      color: white;
    }

    .form-control::placeholder {
      color: #64748b;
    }

    .btn-custom {
      background: #2563eb;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      padding: 10px;
      width: 100%;
    }

    .btn-custom:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

  <div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="card">

      <!-- ✅ LOGO UAC -->
      <img src="/static/logo.png" alt="Logo Universidad" class="logo">

      <!-- TÍTULOS -->
      <div class="titulo">Control de Acceso</div>
      <div class="subtitulo">Universidad Autónoma del Caribe</div>

      <!-- INPUT -->
      <div class="input-group mb-2">
        <span class="input-group-text">ID</span>
        <input id="cedula" class="form-control" placeholder="Ingresa tu cédula">
      </div>

      <!-- BOTÓN -->
      <button class="btn btn-custom" onclick="buscarUsuario()">
        Ingresar
      </button>

    </div>
  </div>

  <script>
    async function buscarUsuario() {
      const cedula = document.getElementById("cedula").value.trim();

      if (!cedula) {
        alert("Ingresa tu cédula");
        return;
      }

      try {
        const res = await fetch(`/buscar_usuario?nombre=${cedula}`);
        const data = await res.json();

        if (!data.encontrado) {
          alert("Usuario no encontrado");
          return;
        }

        window.location.href =
          `/static/qr_dinamico.html?qr=${data.qr_id}&nombre=${cedula}&v=${Date.now()}`;

      } catch (error) {
        alert("Error conectando con el servidor");
        console.error(error);
      }
    }
  </script>

</body>
</html>
