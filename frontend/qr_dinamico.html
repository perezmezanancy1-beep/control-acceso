<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Dinámico</title>

<!-- ✅ BOOTSTRAP CORRECTO -->
https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    font-family: Arial, sans-serif;
}

.card {
    background: #1e293b;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
}

canvas {
    background: white;
    padding: 15px;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card" style="width: 320px;">
        <h4 id="usuario"></h4>
        <canvas id="qr"></canvas>
        <p class="mt-3">⏱️ <span id="time">30</span> s</p>
    </div>
</div>

<!-- ✅ LIBRERÍA QR (ESTO ES OBLIGATORIO) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.4/qrcode.min.jsnst params = new URLSearchParams(window.location.search);
const qrBase = params.get("qr");
const nombre = params.get("nombre");

document.getElementById("usuario").innerText = "ID: " + nombre;

const canvas = document.getElementById("qr");
const timeEl = document.getElementById("time");

let t = 30;

function generarQR() {
    const ts = Math.floor(Date.now() / 1000);
    const contenido = `${qrBase}|${ts}|TEST`;

    QRCode.toCanvas(canvas, contenido, { width: 220 });

    t = 30;
}

setInterval(() => {
    t--;
    timeEl.innerText = t;
    if (t <= 0) generarQR();
}, 1000);

generarQR();
</script>

</body>
</html>
