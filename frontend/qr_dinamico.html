<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Dinámico</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    font-family: Arial, sans-serif;
}

.card {
    background: #1e293b;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
}

#usuario {
    color: #f9fafb;
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 12px;
}

#time {
    color: #38bdf8;
    font-weight: bold;
}

img {
    background: white;
    padding: 15px;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card" style="width: 320px;">
        <div id="usuario"></div>

        <!-- ✅ QR COMO IMAGEN -->
        <img id="qrImage" width="220" height="220" />

        <p class="mt-3">⏱️ <span id="time">30</span> s</p>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const qrBase = params.get("qr");
const nombre = params.get("nombre");

document.getElementById("usuario").innerText = "ID: " + nombre;

const qrImg = document.getElementById("qrImage");
const timeEl = document.getElementById("time");

let tiempo = 30;

function generarQR() {
    const ts = Math.floor(Date.now() / 1000);
    const contenido = `${qrBase}|${ts}|TEST`;

    // ✅ API DE QR (SIN LIBRERÍAS)
    qrImg.src =
        `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(contenido)}`;

    tiempo = 30;
    timeEl.innerText = tiempo;
}

setInterval(() => {
    tiempo--;
    if (tiempo <= 0) {
        generarQR();
    } else {
        timeEl.innerText = tiempo;
    }
}, 1000);

// ✅ Primer QR
generarQR();
</script>

</body>
</html>
