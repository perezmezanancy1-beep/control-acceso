<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Dinámico</title>

<!-- ✅ Bootstrap correcto -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    font-family: Arial, sans-serif;
}

.card {
    background: #1e293b;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
}

/* ✅ ID bien visible */
#usuario {
    color: #e5e7eb;
    font-weight: bold;
    margin-bottom: 12px;
}

/* ✅ QR */
canvas {
    background: white;
    padding: 15px;
    border-radius: 15px;
}

#time {
    color: #38bdf8;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card" style="width: 320px;">
        <h4 id="usuario"></h4>
        <canvas id="qr"></canvas>
        <p class="mt-3">⏱️ <span id="time">30</span> s</p>
    </div>
</div>

<!-- ✅ ✅ ✅ LIBRERÍA QR (ESTO ERA LO QUE FALTABA BIEN PUESTO) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.4/qrcode.min.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const qrBase = params.get("qr");
const nombre = params.get("nombre");

document.getElementById("usuario").innerText = "ID: " + nombre;

const canvas = document.getElementById("qr");
const timeEl = document.getElementById("time");

let tiempo = 30;
let intervalo = null;

function generarQR() {

    // ✅ Seguridad: verificar que la librería existe
    if (typeof QRCode === "undefined") {
        console.error("QRCode no está cargado");
        return;
    }

    const timestamp = Math.floor(Date.now() / 1000);
    const contenido = `${qrBase}|${timestamp}|TEST`;

    QRCode.toCanvas(canvas, contenido, { width: 220 }, function (error) {
        if (error) {
            console.error("Error generando QR:", error);
        }
    });

    tiempo = 30;
    timeEl.innerText = tiempo;
}

// ✅ Contador correcto (no se va a negativo)
intervalo = setInterval(() => {
    tiempo--;
    if (tiempo <= 0) {
        generarQR();
    } else {
        timeEl.innerText = tiempo;
    }
}, 1000);

// ✅ Generar el primer QR
generarQR();
</script>

</body>
</html>
