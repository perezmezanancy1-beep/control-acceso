<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Acceso</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

.card {
    border-radius: 20px;
    background: #1e293b;
}

canvas {
    background: white;
    padding: 20px;
    border-radius: 15px;
}

.nombre {
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 text-center" style="width: 320px;">

        <div class="nombre mb-2" id="nombreUsuario"></div>

        <canvas id="qrCanvas"></canvas>

        <p class="mt-3">
            ⏱️ <span id="tiempo">30</span> segundos
        </p>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>

<script>
let tiempoRestante = 30;

const qrCanvas = document.getElementById("qrCanvas");
const tiempoTexto = document.getElementById("tiempo");

const urlParams = new URLSearchParams(window.location.search);

const qrBase = urlParams.get("qr");
const nombre = urlParams.get("nombre");

document.getElementById("nombreUsuario").innerText = "Cédula: " + nombre;

function generarQR(){

    const timestamp = Math.floor(Date.now() / 1000);

    const qrCompleto = `${qrBase}|${timestamp}|TEST`;

    QRCode.toCanvas(qrCanvas, qrCompleto, { width: 250 });

    tiempoRestante = 30;
}

setInterval(() => {
    tiempoRestante--;
    tiempoTexto.innerText = tiempoRestante;

    if(tiempoRestante <= 0){
        generarQR();
    }
},1000);

generarQR();
</script>

</body>
</html>
