<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Dinámico</title>

<!-- ✅ Bootstrap correcto -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.cssnd: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    font-family: Arial, sans-serif;
}

.card {
    background: #1e293b;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
}

/* ✅ ID visible */
#usuario {
    color: #e5e7eb;
    font-weight: bold;
    margin-bottom: 12px;
}

/* ✅ QR */
canvas {
    background: white;
    padding: 15px;
    border-radius: 15px;
}

#time {
    color: #38bdf8;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card" style="width: 320px;">
        <h4 id="usuario"></h4>
        <canvas id="qr"></canvas>
        <p class="mt-3">⏱️ <span id="time">30</span> s</p>
    </div>
</div>

<!-- ✅ ✅ ✅ AQUÍ ESTABA EL ERROR: LA LIBRERÍA BIEN CARGADA -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.js</script>

<script>
const params = new URLSearchParams(window.location.search);
const qrBase = params.get("qr");
const nombre = params.get("nombre");

document.getElementById("usuario").innerText = "ID: " + nombre;

const canvas = document.getElementById("qr");
const timeEl = document.getElementById("time");

let tiempo = 30;

function generarQR() {
    if (typeof QRCode === "undefined") {
        console.error("QRCode no cargó");
        return;
    }

    const ts = Math.floor(Date.now() / 1000);
    const contenido = `${qrBase}|${ts}|TEST`;

    QRCode.toCanvas(canvas, contenido, { width: 220 });

    tiempo = 30;
    timeEl.innerText = tiempo;
}

setInterval(() => {
    tiempo--;
    if (tiempo <= 0) {
        generarQR();
    } else {
        timeEl.innerText = tiempo;
    }
}, 1000);

// ✅ Generar el primer QR
generarQR();
</script>

</body>
</html>
