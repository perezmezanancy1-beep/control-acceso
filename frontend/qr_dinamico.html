<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Dinámico</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    font-family: Arial, sans-serif;
}

.card {
    background: #1e293b;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
}

#usuario {
    color: #f9fafb;
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 12px;
}

canvas {
    background: white;
    padding: 15px;
    border-radius: 15px;
}

#time {
    color: #38bdf8;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card" style="width: 320px;">
        <div id="usuario"></div>
        <canvas id="qr" width="220" height="220"></canvas>
        <p class="mt-3">⏱️ <span id="time">30</span> s</p>
    </div>
</div>

<!-- ✅ CDN PRINCIPAL -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.4/qrcode.min.js"></script>
<!-- ✅ FALLBACK SI CDN FALLA -->
<script src="https://unpkg.com/qrcode@1.5.4/build/qrcode.min.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const qrBase = params.get("qr");
const nombre = params.get("nombre");

document.getElementById("usuario").innerText = "ID: " + nombre;

const canvas = document.getElementById("qr");
const timeEl = document.getElementById("time");

let tiempo = 30;

function generarQR() {
    if (!window.QRCode) {
        console.error("QRCode no cargó desde ningún CDN");
        return;
    }

    const ts = Math.floor(Date.now() / 1000);
    const contenido = `${qrBase}|${ts}|TEST`;

    QRCode.toCanvas(canvas, contenido, { width: 220 }, function (err) {
        if (err) console.error("Error QR:", err);
    });

    tiempo = 30;
    timeEl.innerText = tiempo;
}

setInterval(() => {
    tiempo--;
    if (tiempo <= 0) {
        generarQR();
    } else {
        timeEl.innerText = tiempo;
    }
}, 1000);

// ✅ PRIMER QR
setTimeout(generarQR, 200);
</script>

</body>
</html>
