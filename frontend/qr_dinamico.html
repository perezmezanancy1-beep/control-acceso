<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso UAC</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    font-family: Arial, sans-serif;
}

.card {
    background: #1e293b;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
}

canvas {
    background: white;
    padding: 15px;
    border-radius: 15px;
}

/* ✅ PANTALLA PRO */
.overlay {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-size: 26px;
    font-weight: bold;
    z-index: 999;
}

.ok {
    background: #16a34a;
}

.out {
    background: #2563eb;
}

.error {
    background: #dc2626;
}
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card" style="width: 320px;">
        <h4 id="usuario"></h4>
        <canvas id="qr"></canvas>
        <p class="mt-3">⏱️ Válido por <span id="time">30</span> s</p>
    </div>
</div>

<!-- ✅ OVERLAY PRO -->
<div id="overlay" class="overlay">
    <div id="msg"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.4/qrcode.min.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const qrBase = params.get("qr");
const nombre = params.get("nombre");
const status = params.get("status"); // entrada | salida | error

document.getElementById("usuario").innerText = "ID: " + nombre;

const canvas = document.getElementById("qr");
const timeEl = document.getElementById("time");

let t = 30;

function generarQR() {
    const ts = Math.floor(Date.now() / 1000);
    const contenido = `${qrBase}|${ts}|TEST`;
    QRCode.toCanvas(canvas, contenido, { width: 220 });
    t = 30;
}

setInterval(() => {
    t--;
    timeEl.innerText = t;
    if (t <= 0) generarQR();
}, 1000);

generarQR();

/* ✅ MOSTRAR PANTALLA PRO */
if (status) {
    const overlay = document.getElementById("overlay");
    const msg = document.getElementById("msg");

    overlay.style.display = "flex";

    if (status === "entrada") {
        overlay.classList.add("ok");
        msg.innerText = "✅ ACCESO PERMITIDO";
    }
    else if (status === "salida") {
        overlay.classList.add("out");
        msg.innerText = "🔵 SALIDA REGISTRADA";
    }
    else {
        overlay.classList.add("error");
        msg.innerText = "❌ ACCESO DENEGADO";
    }

    setTimeout(() => overlay.style.display = "none", 3000);
}
</script>

</body>
</html>
